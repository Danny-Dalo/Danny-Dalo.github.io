<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tieralist — E-Commerce Retention Analytics</title>
<link rel="icon" type="image/png" href="tieralist_logo.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Switched to a white background */
      background: #ffffff;
      /* Switched text color to dark for contrast */
      color: #0f172a; 
      /* Applied the Outfit font for a more luxurious modern feel */
      font-family: 'Outfit', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 4rem;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }
    p {
      font-size: 1.2rem;
      color: #64748b;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    /* Fancy Liquid Glass Badge */
    .badge {
      position: relative;
      display: inline-block;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #334155;
      
      /* Subtle transparent background gradient */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 244, 248, 0.4) 100%);
      
      /* Glassmorphism blur */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      
      /* Border and Pill Shape */
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 999px;
      
      /* Shadows to create 3D liquid depth and luxury feel */
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.04),         /* Soft drop shadow */
        inset 0 2px 4px rgba(255, 255, 255, 1), /* Top inner highlight */
        inset 0 -2px 6px rgba(0, 0, 0, 0.03);   /* Bottom inner shadow */
      
      overflow: hidden;
      cursor: default;
    }

    /* Animated liquid shine reflection */
    .badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right, 
        rgba(255, 255, 255, 0) 0%, 
        rgba(255, 255, 255, 0.8) 50%, 
        rgba(255, 255, 255, 0) 100%
      );
      transform: skewX(-25deg);
      animation: liquid-shine 4s infinite ease-in-out;
    }

    @keyframes liquid-shine {
      0% { left: -150%; }
      15% { left: 200%; }
      100% { left: 200%; }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.5rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      Coming Soon
    </div>
  </div>
</body>
</html>
